services:

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6375:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Ollama ──────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    # Port intentionally NOT exposed to host to avoid conflicts with a local
    # Ollama install. api and worker reach it via internal Docker network.
    # Uncomment if you want to query Ollama directly from your host:
    # ports:
    #   - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      # Use ollama list — always available in the image, unlike curl
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Model pull (runs once then exits) ───────────────────────────────────────
  ollama-pull:
    image: ollama/ollama:latest
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "
        ollama pull qwen2.5:3b-instruct &&
        ollama pull llama3.2
      "
    volumes:
      - ollama_data:/root/.ollama

  # ── FastAPI ─────────────────────────────────────────────────────────────────
  api:
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    volumes:
      - ./src:/app/src
      - resume_output:/app/src/outputs
    ports:
      - "8001:8000"
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      OLLAMA_ENDPOINTS: '["http://ollama:11434"]'
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy

  # ── Celery worker ────────────────────────────────────────────────────────────
  worker:
    build: .
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=2
    restart: unless-stopped
    volumes:
      - ./src:/app/src
      - resume_output:/app/src/outputs
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      OLLAMA_ENDPOINTS: '["http://ollama:11434"]'
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
  resume_output: