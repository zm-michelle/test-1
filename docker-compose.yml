services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6375}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  ollama-pull:
    image: ollama/ollama:latest
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "
        ollama pull ${SMART_LLM_MODEL:-qwen2.5:7b-instruct} &&
        ollama pull ${FAST_LLM_MODEL:-llama3.2}
      "
    volumes:
      - ollama_data:/root/.ollama

  api:
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    volumes:
      - ./src:/app/src
      - resume_output:/app/src/outputs
    ports:
      - "${API_PORT:-8001}:8000"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy

  worker:
    build: .
    command: >
      celery -A tasks.celery_app worker
      --loglevel=${CELERY_LOG_LEVEL:-info}
      --concurrency=${CELERY_CONCURRENCY:-2}
    restart: unless-stopped
    volumes:
      - ./src:/app/src
      - resume_output:/app/src/outputs
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
  resume_output: